<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity WebGL Player | WhiteCanvas</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000; /* Prevent background flickering while loading */
      }
      #unity-container {
        width: 100% !important;
        height: 100% !important;
        position: absolute;
        top: 0;
        left: 0;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }
      /* Optional: Hide the default footer since it takes away screen space in full-bleed web views */
      #unity-footer {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    
    <script>
      var loaderFile = "shader-testing.loader.js";
      var dataFile = "shader-testing.data.unityweb";
      var frameworkFile = "shader-testing.framework.js.unityweb";
      var codeFile = "shader-testing.wasm.unityweb";
      
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/" + loaderFile;
      var config = {
        dataUrl: buildUrl + "/" + dataFile,
        frameworkUrl: buildUrl + "/" + frameworkFile,
        codeUrl: buildUrl + "/" + codeFile,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "PeakActivity",
        productName: "WhiteCanvas",
        productVersion: "0.1",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      // Appending meta viewport settings for responsive rendering setups
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        config.devicePixelRatio = 1;
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        })
          .then((unityInstance) => {
            loadingBar.style.display = "none";
            window.unityInstance = unityInstance;
          })
          .catch((message) => {
            alert(message);
          });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
